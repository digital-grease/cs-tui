name: Release

# Build cross-platform release binaries and attach them to a GitHub Release
# whenever a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Builds the `cs-tui` binary for the target, archives it (.tar.gz on
      # Unix, .zip on Windows), and uploads it to the Release for this tag,
      # creating the Release if it doesn't exist yet. Handles musl cross-build.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cs-tui
          target: ${{ matrix.target }}
          archive: cs-tui-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
