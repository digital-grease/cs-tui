name: Release

# Build cross-platform release binaries and attach them to a GitHub Release
# whenever a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # upload-rust-binary-action uploads into an existing Release but does not
  # create one, so make the Release once here; the matrix below fills it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The static musl target needs a musl C toolchain because `ring` (our TLS
      # backend) compiles a little C. This sets up musl-gcc + the linker/CC env
      # so the build below uses cargo on the host instead of falling back to
      # cross/Docker. The native gnu, macOS, and Windows legs don't need it.
      - name: Set up musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # Builds the `cs-tui` binary for the target, archives it (.tar.gz on
      # Unix, .zip on Windows), and uploads it to the Release created above.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cs-tui
          target: ${{ matrix.target }}
          archive: cs-tui-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
